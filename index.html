<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untukmu 💌</title>

<style>

html, body {
  margin: 0;
  padding: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  min-height: 100vh;
  overflow-y: auto;
  scroll-behavior: smooth;
}

body{
  padding:40px 20px;
  display:block;
}

.container {
  background: white;
  padding: 30px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  max-width: 700px;
  margin:auto;
  animation: fadeIn 1.5s ease-in-out;
  position: relative;
  z-index: 2;
}

button {
  padding: 15px 25px;
  border: none;
  border-radius: 50px;
  background: #ff6b81;
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #ff4757;
  transform: scale(1.05);
}

#message {
  display: none;
  margin-top: 20px;
  text-align: left;
  line-height: 1.7;
}

/* Animasi Hati */
.heart {
  position: fixed;
  width: 20px;
  height: 20px;
  background: red;
  transform: rotate(45deg);
  animation: float 8s linear infinite;
}

.heart:before,
.heart:after {
  content: '';
  width: 20px;
  height: 20px;
  background: red;
  border-radius: 50%;
  position: absolute;
}

.heart:before {
  top: -10px;
  left: 0;
}

.heart:after {
  left: -10px;
  top: 0;
}

@keyframes float {
  0% {
    transform: translateY(100vh) rotate(45deg);
    opacity: 1;
  }
  100% {
    transform: translateY(-10vh) rotate(45deg);
    opacity: 0;
  }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px);} 
  to { opacity: 1; transform: translateY(0);} 
}

iframe {
  display: none;
}

</style>
</head>

<body>

<!-- Musik -->
<iframe id="music" width="0" height="0" 
src="https://www.youtube.com/embed/6a8hN6pZ3a8?autoplay=1&loop=1&playlist=6a8hN6pZ3a8&mute=0&enablejsapi=1">
</iframe>

  <button onclick="showMessage()">Klik di sini ❤️</button>
  
  <div id="message">
